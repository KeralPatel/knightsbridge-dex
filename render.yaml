services:
  - type: worker
    name: knightsbridge-worker
    runtime: node
    region: oregon
    plan: starter
    rootDir: worker
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WORKER_HMAC_SECRET
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: ETH_MAINNET_RPC_URL
        sync: false
      - key: BASE_MAINNET_RPC_URL
        sync: false
      - key: DEBUG
        value: "false"
    autoDeploy: true
    healthCheckPath: ~
